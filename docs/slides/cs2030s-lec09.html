.smaller[
```Java
public static <T> InfiniteList<T> iterate(
    T init, 
	Transformer<T, T> next) {
  return new InfiniteList<T>(
      () -> init,
	  () -> iterate(next.transform(init), next));
}
```
]

.smaller[
```Java
public <R> InfiniteList<R> map(
    Transformer<? super T, ? extends R> mapper) {
  return new InfiniteList<>(
      () -> mapper.transform(this.head()),
      () -> this.tail().map(mapper));
}
```

# Streams

(in Java)

---
### Data sources

- Static factory methods `of`, `generate`, `iterate`

- Arrays (through `Arrays::stream`)

- Collections (e.g., `List::stream`)

- Other APIs (`BufferedReader::lines`, `Random::ints`, ...)

---
### Intermediate Operations 

.tiny[
| what for | methods |
|----------|---------|
| select what we need | `filter` |
| transform each element | `map`, `flatMap` |
| truncate a stream | `takeWhile`, `limit` |
| sort the stream | `sorted` |
| remove duplicates | `distinct` |
| peek into the stream | `peek` |
]
---
### Terminal Operations 

.tiny[
| what for | methods |
|----------|---------|
| act on each element | `forEach` |
| combine elements into a value | `reduce` |
| check for global properties | `noneMatch`, `allMatch`, `anyMatch` |
| count how many elements | `count` |
| retrieve the first | `findFirst` |
| turn into a list/an array | `toList`, `toArray` |
]

### Is it prime?

.left-column[
.tiny[
```Java
boolean isPrime(int x) {
  for (int i = 2; i < x; i++) {
    if (x % i == 0) {
      return false;
    }
  }
  return true;
}
```
]
]

--

.right-column[
.tiny[
```Java
boolean isPrime(int x) {
  return Stream
      .iterate(2, i -> i + 1)
      .takeWhile(i -> i < x)
      .noneMatch(i -> x % i == 0);
}
```
]
]

### First 500 Primes

.left-column[
.tiny[
```Java
void fiveHundredPrime() {
  int count = 0;
  int i = 2;
  while (count < 500) {
    if (isPrime(i)) {
      System.out.println(i);
      count++;
    }
    i++;
  }
}
```
]
]

--

.right-column[
.tiny[
```Java
void fiveHundredPrime() {
  IntStream
      .iterate(2, x -> x + 1)
      .filter(x -> isPrime(x))
      .limit(500)
      .forEach(System.out::println);
}
```
]
]

### Total length of strings

.left-column[
.tiny[
```Java
int totalLength(List<String> list) {
  int count = 0;
  for (String s : list) {
    count += s.length();
  }
  return count;
}
```
]
]

--

.right-column[
.tiny[
```Java
int totalLength(List<String> list) {
  return list.stream()
      .map(s -> s.length())
      .reduce(0, (a, b) -> a + b);
}
```
]
]

### Total length of strings _without repetition_

.left-column[
.tiny[
```Java
int totalLength(List<String> list) {
  int count = 0;
  List<String> seen;
  seen = new ArrayList<>();
  for (String s : list) {
    if (!seen.contains(s)) {
      count += s.length();
      seen.add(s);
    }
  }
  return count;
}
```
]
]

--

.right-column[
.tiny[
```Java
int totalLength(List<String> list) {
  return list.stream()
      .distinct()
      .map(s -> s.length())
      .reduce(0, (a, b) -> a + b);
}
```
]
]

### Stateful Operations

`distinct` and `sorted` are _stateful_ operations. 

They require the stream to keep track of the elements seen so far.

---
.small[
Stateful operations must operate on a bounded stream.
