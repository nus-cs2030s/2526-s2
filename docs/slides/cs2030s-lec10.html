### Functional Abstractions

- `Box<T>`
- `Maybe<T>`
- `Lazy<T>`
- `InfiniteList<T>`
- `Stream<T>`

---
### Functional Abstractions

- Support operations such as `of`, `map`, `filter`, `flatMap`

- New idiom: compute by composing a pipeline

- Each encapsulates some values and a "context"

---
### "Context"

.tiny[
| Abstraction | Num of Values | Context $c$       |
|-------------|---------------|-------------------|
| Box<T>      | 1             | None              |
| Maybe<T>    | 0 or 1        | Is there a value? |
| Lazy<T>     | 1             | Has the value been evaluated? |
| InfiniteList<T> | At least 1  | Has the values been evaluated? |
| Stream<T>       | At least 0  | Has the values been evaluated? |
]

---
### Monad

- Encapsulates values and context

- Support `of` and `flatMap`

- Adhere to identify and associative laws

---
.small[
```Java
int incr(int x) {
	return x + 1;
}
  
int abs(int x) {
	return x > 0 ? x : -x;
}
```
]

---
### The methods are composable

.small[
```Java
incr(4);
abs(incr(5));
incr(abs(incr(incr(-5))));
```
]


---
.small[
```Java
Pair<Integer, String> incrWithLog(int x) {
  return Pair.of(incr(x), "incr " + x);
}
  
Pair<Integer, String> absWithLog(int x) {
  return Pair.of(abs(x), "abs " + x);
}
```
]

---
### The methods are no longer composable

.small[
```Java
absWithLog(incrWithLog(5));
```
]

---
.tiny[
```Java
Pair<Integer, String> incrWithLog(Pair<Integer, String> p) {
  return Pair.of(incr(p.first), p.second + " incr " + p.first);
}
  
Pair<Integer, String> absWithLog(Pair<Integer, String> p) {
  return Pair.of(abs(p.first), p.second + " abs " + p.first);
}
```
]
---
### The methods are composable again

.small[
```Java
absWithLog(incrWithLog(5));
```
]

But we need to implement `xWithLog` for every method `x`.

### Monad

- Encapsulates values and context

- Support `of` and `flatMap`

---
### Left Identity Law

`Monad.of(x).flatMap(y -> f(y))` 

is equivalent to `f(x)`

e.g., the following statements are the same:
.small[
```Java
Loggable.of(5).flatMap(x -> incrWithLog(x)));
incrWithLog(5);
```
]

### Right Identity Law

`monad.flatMap(y -> Monad.of(y))` 

is equivalent to `monad`

e.g., the following statements are the same:
.small[
```Java
incrWithLog(5).flatMap(x -> Loggable.of(x)));
incrWithLog(5);
```
]

### Associative Law

`monad.flatMap(x -> f(x)).flatMap(x -> g(x))`

is equivalent to

`monad.flatMap(x -> f(x).flatMap(x -> g(x)))`

A functor has two methods `of` and `map` and obeys two laws.

---
`functor.map(x -> x)` 

is just 

`functor`

---

is just 

`functor.map(x -> g(f(x)))`

## Parallel Streams

---
### Sequential Execution

- Executing the tasks one after another

---
### Concurrent Execution

- Breaking a task down into subtasks, and executing the subtasks within the same time window with some overlapping time

- Can be run with a single processor, but switching between the subtasks

---
### Parallel Execution

- Breaking a task down into subtasks, and executing the subtasks at the same time

- Requires hardware support (multicore, multiprocessor, etc)

### Parallelising Reduce

.small[
```Java
Stream.of(1,2,3,4).reduce(1,   // identity
   (x, y) -> x * y,            // combiner
   (x, y) -> x * y);           // accumulator
```
]

---
### Parallelising Reduce with 3 Args

- `combiner.apply(identity, i)` must be equal to `i`.

- The `combiner` must be associative

- The `combiner` and the `accumulator` must be compatible

---
### Compatibility of Combiner and Accumulator

`combiner.apply(u, accumulator.apply(identity, t))`

must be equal to

`accumulator.apply(u, t)`

---
### Ordered vs Unordered Streams

- Ordered source: `list.stream()`, `iterate`, `of`, 

- Unordered source: `set.stream()`, `generate` 

- `limit`, `distinct`, `sorted`, `map`, preserves the order
