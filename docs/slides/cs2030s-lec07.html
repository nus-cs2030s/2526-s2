### Immutable Classes

- A class is _immutable_ if it does not have visible changes outside its abstraction barrier.

- Calling the same method with the same arguments on the same object will always produce the same result.

### Inner Class Usage I

If a class is huge, consider encapsulating methods and fields within the class into inner classes.

Example: a `Node` class for a linked list can be an inner class of the `LinkedList` class.

---
### Inner Class Usage II

If a class is only used within another class, consider making it a inner class.

Example: `Event` and its subclasses are only used within the simulator.

---
### Inner Class Usage III

We can compartmentalise internal logic of a class into inner classes.

Example: Empty vs Non-empty `Box<T>`

### Local Class (Class Within a Method)

If a class is only used within another method, consider making it a local class.

A local class can access the variables in the call frame of the method where it is defined, and the `this` reference of the class where it is defined.

---
.tiny[
```Java
interface Fooable { 
  void foo(); 
}
  
class A {
  int x = 1;
  
  Fooable createB() {
    int y = 1;
    
    class B implements Fooable {
      public void foo() {
        A.this.x = y; // accessing x and y is OK.
      }
    }
   
    B b = new B();
    return b;
  }
}
```
]
---
### How to execute `foo()`?

.smaller[
```Java
A a = new A();
Fooable b = a.createB();
b.foo(); // set A.this.x = y;
```
]

---
### Variable Capture

Local classes keep a copy of:

- the local variables and parameters of the enclosing method, if they are used

- the `this` reference of the enclosing class

The fields of the enclosing class are not captured.
