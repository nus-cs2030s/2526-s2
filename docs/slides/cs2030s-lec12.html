### The Abstraction Principle

"Each significant piece of functionality in a program should be implemented in just one place in the source code. Where similar functions are carried out by distinct pieces of code, it is generally beneficial to combine them into one by abstracting out the varying parts." 

-- _Benjamin C. Pierce_

### The Object-Oriented Principles

- **Encapsulation:** bundling of methods and data together

- **Inheritance:** extending behavior of existing classes

- **Polymorphism:** the ability of objects to take on many forms

- **Abstraction:** hiding the details and modeling only the essentials

---
### Other Principles

- **Composition:** building complex objects from simpler ones

- **Information Hiding:** hide the internal state and implementation, only interact through an object's methods

- **Tell, Don't Ask:** telling objects what to do, not asking for their state

---
### Abstraction Barrier

- Software is a product of teamwork.  

- Two roles: client and implementer

- Abstraction barrier is hierarchical: classes, packages, modules.

---
OO principles make our code better:

- easier to read
- easier to change and maintain

### Liskov Substitution Principle (LSP)

If $S$ is a subclass of $T$, then an object of type $T$ can be replaced by that of type $S$ without changing the _desirable property_ of the program.

---
LSP makes our code better:

- easier to reason about
- fewer surprises

### Type Systems

Java is a strongly and statically typed language

Every variable has a 

- compile-time type (declared and fixed)
- runtime type (the type of the value it holds)

Type communicates what a variable is for and what it can do

---
### Subtyping

A type $S$ is a subtype of type $T$ (written $S <: T$) if any value of type $S$ can be used in a context where a value of type $T$ is expected.

RTT(v) $<:$ CTT(v) must hold during execution, at all times.

---
.right-column[
The compiler checks our code for type errors (and other errors).  _Fail early_ if our code is not type safe.
]

.left-column[
![:scale 100%](figures/memes/drake-runtime-vs-compile-time.jpg)
]

---
### Type casting

We can override compiler checks with casts, but only if we know what we are doing.

- Widening conversion: from subtype to supertype, always safe, implicit

- Narrowing conversion: from supertype to subtype, not always safe, explicit
    - requires a runtime check

---
Strong and static typing makes our code better:

- easier to read, understand, and reason about
- fewer crashes

---
### Exceptions

- A language construct to handle errors and other exceptional events

- Short circuit the execution flow when error occurs -- avoid passing error values to caller

---

Using exceptions makes our code better:

- easier to read, understand, and reason about
- easier to change and maintain
- fewer crashes and surprises

---
### Generics 

- Abstract out types common to a family of classes or methods into type parameters. 

- Avoid explicit casts

---
### Variance of Types

- If $S <: T$, then is $C(S)$ <: $C(T)$  (Covariance)
- If $S <: T$, then is $C(T)$ <: $C(S)$  (Contravariance)

- Invariance: neither covariance nor contravariance

---
### Loop hole in the type system

- Java arrays are covariance

- Possible to have compilable code that leads to runtime errors.

---
### Rethinking Variance of Generics

- Java generics are invariant

- To allow flexibility, Java introduces wildcards with upper and lower bounds.

- PECS: producer extends, consumer super

---
### Type Erasure

- Type parameters are not available at runtime.

- Not all type casts can be checked at runtime, leading to "unchecked" warnings.

---
Generics makes our code better:

- easier to change and maintain
- fewer crashes

### Minimizing Moving Parts

- Immutability
- Pure functions

---
### Immutability 

- An instance does not have any visible changes outside the abstraction barrier

- Same instance, same method, same arguments -> same result

- Return a new instance with the new state instead of mutating the existing instance

---
### Pure Functions

- Always return the same output given the same input. 

- With no side effects

- Referential transparency: method call can be replaced by its result without changing the program behavior

### Closures

- A lambda expression that captures the variables in its lexical scope, to be used later.

- Captured variables must be final or effectively final

- Reduce the need to pass the contextual parameters around 

---
Closures make our code better:

- easier to read, understand, and reason about

### Encapsulating Items and its Context

- `Box<T>`: just an item in a box
- `Maybe<T>`: item might be missing
- `Lazy<T>`: item is evaluated lazily
- `Stream<T>`: items are evaluated lazily
- `InfiniteList<T>`: items are evaluated lazily
- `Loggable<T>`: item is logged
- `CompletableFuture<T>`: item is available in the future

---
### `Maybe<T>`

- Reduce the possibility of `NullPointerException`

- Internalize `null` checks and default values

.tiny[
Also known as `Option` or `Optional` in other languages
]

---
### Lazy Evaluation

- `Lazy<T>`
- `InfiniteList<T>`

Only compute when the result is needed.  

Memoize the result to avoid repeated computation.

Other functional languages are lazy by default

---
### `Stream<T>`

- API provided by Java for processing sequences of elements

- Support parallel processing

---
### Monads

Allow chaining of computations on values with context

- `of` initializes the context with identity

- `flatMap` combines the context associatively

---
### Monads

- Hide complexity and control flows -- we focus on the business logic

- Predictable code and behavior across team members

### OOP or FP?

- We are not telling you "OOP is better" or "FP is better"

- "Here are different ways you can write your code.  Pick one that is best for you."

- Core strength of OOP: easy to extend

- Core strength of FP: easy to reason about
